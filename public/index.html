<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #0a0a0a; color: #ffd966; padding: 20px; font-family: monospace; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #1a1a1a; border: 1px solid #ffd966; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .upload-area { border: 2px dashed #ffd966; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; margin: 15px 0; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 30px; border: none; }
        input { background: #2c2c2c; color: #ffd966; }
        button { background: #ffd966; color: #000; font-weight: bold; cursor: pointer; }
        .stat-item { background: #2c2c2c; padding: 15px; margin: 10px 0; border-radius: 15px; border-left: 4px solid #ffd966; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #2c2c2c; border-radius: 30px; cursor: pointer; }
        .tab.active { background: #ffd966; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .debug { background: #111; padding: 10px; margin-top: 10px; font-size: 11px; color: #0f0; max-height: 200px; overflow: auto; }
        .nick-row { display: flex; gap: 10px; align-items: center; }
        .nick-row input { flex: 1; }
        .nick-row button { width: auto; padding: 8px 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="text-align: center;">
        <h1>⚔️ ARENA STATS</h1>
        <p><a href="https://t.me/flikfak" target="_blank" style="color:#ffd966;">🤝 @flikfak — сотрудничество</a></p>
    </div>

    <!-- Авторизация -->
    <div id="authBlock" class="card">
        <div class="tabs">
            <div class="tab active" onclick="showAuthForm('login')">Вход</div>
            <div class="tab" onclick="showAuthForm('register')">Регистрация</div>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="doLogin()">Войти</button>
            <div id="loginMsg"></div>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="text" id="regGameNick" placeholder="Ник в игре" value="Flik_Homixide">
            <button onclick="doRegister()">Зарегистрироваться</button>
            <div id="regMsg"></div>
        </div>
    </div>

    <!-- Профиль (ник) -->
    <div id="profileBlock" class="card" style="display:none;">
        <div class="nick-row">
            <input type="text" id="nickInput" placeholder="Твой ник как на скриншоте">
            <button onclick="saveNick()">💾 Сохранить ник</button>
        </div>
        <div>Текущий ник: <strong id="currentNickDisplay">Flik_Homixide</strong></div>
        <button onclick="logout()" class="btn-outline" style="background:#333; color:#ffd966; margin-top:10px;">🚪 Выйти</button>
    </div>

    <!-- Загрузка скриншота -->
    <div id="uploadBlock" class="card" style="display:none;">
        <h3>📸 Загрузить скриншот</h3>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            📸 Нажми или перетащи скриншот
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>
        <div id="preview"></div>
        <input type="text" id="videoLink" placeholder="🎥 Ссылка на видео">
        <div id="ocrResult" style="background:#2c2c2c; padding:10px; border-radius:15px; margin:10px 0; display:none;"></div>
        <button id="sendBtn" style="display:none;" onclick="sendStats()">📤 Отправить статистику</button>
        <div id="uploadMsg"></div>
    </div>

    <!-- Вкладки -->
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('leaderboard')">🏆 Лидерборд</div>
            <div class="tab" onclick="showTab('mystats')">📋 Моя статистика</div>
            <div class="tab" id="adminTab" style="display:none;" onclick="showTab('admin')">🔧 Админ-панель</div>
        </div>

        <div id="leaderboardTab" class="tab-content active">
            <input type="text" id="searchPlayer" placeholder="🔍 Поиск игрока..." style="margin-bottom:10px;">
            <div id="leaderboardList"></div>
        </div>

        <div id="mystatsTab" class="tab-content">
            <div id="myStatsList"></div>
        </div>

        <div id="adminTabContent" class="tab-content">
            <div id="adminList"></div>
        </div>
    </div>

    <!-- Отладка -->
    <div class="card" style="background:#111;">
        <details>
            <summary>🔧 Отладка (нажми чтобы открыть)</summary>
            <div id="debugLog" class="debug"></div>
        </details>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let currentUser = null;
    let currentImageData = null;
    let recognizedStats = null;
    let ocrWorker = null;
    let localNick = localStorage.getItem('arena_nick') || 'Flik_Homixide';

    function log(msg) {
        const debugDiv = document.getElementById('debugLog');
        if (debugDiv) {
            debugDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }
        console.log(msg);
    }

    // Показать сообщение
    function showMsg(elId, msg, isError = false) {
        const el = document.getElementById(elId);
        if (el) {
            el.innerHTML = `<div style="padding:10px; background:${isError ? '#c6282840' : '#2e7d3240'}; border-radius:15px; margin-top:10px;">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 4000);
        }
    }

    // Сохранить ник
    function saveNick() {
        const newNick = document.getElementById('nickInput').value.trim();
        if (newNick) {
            localNick = newNick;
            localStorage.setItem('arena_nick', localNick);
            document.getElementById('currentNickDisplay').innerText = localNick;
            document.getElementById('nickInput').value = '';
            log(`✅ Ник сохранён: ${localNick}`);
            showMsg('uploadMsg', `✅ Ник сохранён: ${localNick}`, false);
        } else {
            showMsg('uploadMsg', '❌ Введите ник', true);
        }
    }

    function getCurrentNick() {
        return localNick || (currentUser?.gameNick) || (currentUser?.username) || '';
    }

    // ========== АВТОРИЗАЦИЯ ==========
    async function doRegister() {
        const payload = {
            username: document.getElementById('regUsername').value,
            password: document.getElementById('regPassword').value,
            gameNick: document.getElementById('regGameNick').value
        };
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            showMsg('regMsg', '✅ Регистрация успешна! Теперь войдите.', false);
            showAuthForm('login');
        } else {
            showMsg('regMsg', `❌ ${data.error}`, true);
        }
    }

    async function doLogin() {
        const payload = {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
        };
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('authBlock').style.display = 'none';
            document.getElementById('profileBlock').style.display = 'block';
            document.getElementById('uploadBlock').style.display = 'block';
            document.getElementById('currentNickDisplay').innerText = localNick || currentUser.gameNick || currentUser.username;
            if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'inline-block';
            log(`✅ Вход выполнен: ${currentUser.username} (${currentUser.role})`);
            loadLeaderboard();
            loadMyStats();
            if (currentUser.role === 'admin') loadAdminStats();
        } else {
            showMsg('loginMsg', `❌ ${data.error}`, true);
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('user');
        location.reload();
    }

    function showAuthForm(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        if (tab === 'leaderboard') loadLeaderboard();
        if (tab === 'mystats') loadMyStats();
        if (tab === 'admin' && currentUser?.role === 'admin') loadAdminStats();
    }

    // ========== ЛИДЕРБОРД ==========
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '<h4>🏆 ТОП ИГРОКОВ</h4>';
            if (!data.length) { container.innerHTML += '<p>Нет данных</p>'; return; }
            data.slice(0, 20).forEach((p, i) => {
                container.innerHTML += `
                    <div class="stat-item" style="border-left-color: ${i===0?'gold':i===1?'silver':'#cd7f32'}">
                        <b>${i+1}. ${p.game_nick || p.username}</b> (${p.username})<br>
                        💀 ${p.kills} убийств | ⚡ ${p.damage?.toLocaleString()} урона
                        ${p.video_link ? `<br>🎥 <a href="${p.video_link}" target="_blank">Видео</a>` : ''}
                    </div>
                `;
            });
        } catch(e) { log('Leaderboard error: ' + e); }
    }

    // ========== МОЯ СТАТИСТИКА ==========
    async function loadMyStats() {
        if (!currentUser) return;
        try {
            const res = await fetch('/api/stats/my', { headers: { username: currentUser.username } });
            const stats = await res.json();
            const container = document.getElementById('myStatsList');
            container.innerHTML = '<h4>📋 Твоя статистика</h4>';
            if (!stats.length) { container.innerHTML += '<p>Нет данных. Загрузи скриншот!</p>'; return; }
            for (let s of stats) {
                container.innerHTML += `
                    <div class="stat-item">
                        <div><b>${new Date(s.date).toLocaleDateString()}</b> | Ник: ${s.game_nick || s.username}</div>
                        <div>💀 ${s.kills} | 🎯 ${s.kill_percent || 0}% | 💥 HS ${s.hs_percent || 0}% | ⚡ ${s.damage?.toLocaleString()}</div>
                        <div>🎥 ${s.video_link ? `<a href="${s.video_link}" target="_blank">Видео</a>` : '—'}</div>
                        <div>${s.screenshot ? `<img src="${s.screenshot}" style="max-width:100px; border-radius:10px; cursor:pointer;" onclick="showFullImage('${s.screenshot}')">` : '—'}</div>
                        <div>Статус: ${s.verified ? '✅ Подтверждена' : '⏳ Ожидает проверки'}</div>
                        ${!s.verified ? `<button onclick="deleteMyStat(${s.id})" style="background:#c62828; margin-top:8px;">🗑️ Удалить</button>` : ''}
                    </div>
                `;
            }
        } catch(e) { log('MyStats error: ' + e); }
    }

    async function deleteMyStat(id) {
        if (!confirm('Удалить эту статистику?')) return;
        const res = await fetch(`/api/stats/${id}`, { method: 'DELETE' });
        if (res.ok) { loadMyStats(); loadLeaderboard(); showMsg('uploadMsg', '✅ Удалено', false); }
        else showMsg('uploadMsg', '❌ Ошибка', true);
    }

    // ========== АДМИН-ПАНЕЛЬ ==========
    async function loadAdminStats() {
        if (!currentUser || currentUser.role !== 'admin') return;
        try {
            const res = await fetch('/api/stats/all');
            const allStats = await res.json();
            const unverified = allStats.filter(s => !s.verified);
            const container = document.getElementById('adminList');
            container.innerHTML = '<h4>🔧 Неподтверждённая статистика</h4>';
            if (!unverified.length) { container.innerHTML += '<p>✅ Нет ожидающих</p>'; return; }
            for (let s of unverified) {
                container.innerHTML += `
                    <div class="stat-item">
                        <div><b>${s.game_nick || s.username}</b> (${s.username})</div>
                        <div>💀 ${s.kills} | 🎯 ${s.kill_percent || 0}% | 💥 HS ${s.hs_percent || 0}% | ⚡ ${s.damage?.toLocaleString()}</div>
                        <div>🎥 ${s.video_link ? `<a href="${s.video_link}" target="_blank">Видео</a>` : '—'}</div>
                        <div>${s.screenshot ? `<img src="${s.screenshot}" style="max-width:100px; border-radius:10px; cursor:pointer;" onclick="showFullImage('${s.screenshot}')">` : '—'}</div>
                        <div>
                            <button onclick="verifyStat(${s.id})" style="background:#2e7d32;">✅ Подтвердить</button>
                            <button onclick="deleteStat(${s.id})" style="background:#c62828;">🗑️ Отклонить</button>
                        </div>
                    </div>
                `;
            }
        } catch(e) { log('AdminStats error: ' + e); }
    }

    async function verifyStat(id) { await fetch(`/api/stats/${id}/verify`, { method: 'PUT' }); loadAdminStats(); loadLeaderboard(); loadMyStats(); showMsg('uploadMsg', '✅ Подтверждено', false); }
    async function deleteStat(id) { if (!confirm('Удалить?')) return; await fetch(`/api/stats/${id}`, { method: 'DELETE' }); loadAdminStats(); loadLeaderboard(); loadMyStats(); showMsg('uploadMsg', '✅ Удалено', false); }
    function showFullImage(src) { const m = document.createElement('div'); m.className = 'modal'; m.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:1000;cursor:pointer;'; m.innerHTML = `<img src="${src}" style="max-width:90%;max-height:90%;border-radius:20px;">`; m.onclick = () => m.remove(); document.body.appendChild(m); }

    // ========== НЕЙРОНКА ==========
    async function findMyStatsInScreenshot() {
        if (!currentImageData) return null;
        const nickToFind = getCurrentNick();
        if (!nickToFind) return null;
        
        if (!ocrWorker) {
            log('Загрузка нейронки...');
            ocrWorker = await Tesseract.createWorker('rus+eng', 1);
            await ocrWorker.setParameters({
                tessedit_char_whitelist: '0123456789%abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ_',
                tessedit_pageseg_mode: '6'
            });
            log('Нейронка готова');
        }
        
        log('Распознавание...');
        const { data: { text } } = await ocrWorker.recognize(currentImageData);
        log('Распознанный текст: ' + text.substring(0, 200));
        const lines = text.split('\n');
        for (let line of lines) {
            if (line.toLowerCase().includes(nickToFind.toLowerCase())) {
                const numbers = line.match(/\d+/g);
                if (numbers && numbers.length >= 4) {
                    log(`Найдено в строке: ${line}`);
                    return {
                        kills: parseInt(numbers[0]),
                        killPercent: parseFloat(numbers[1]),
                        hsPercent: parseFloat(numbers[2]),
                        damage: parseInt(numbers[3])
                    };
                }
            }
        }
        return null;
    }

    document.getElementById('fileInput').onchange = async (e) => {
        const f = e.target.files[0];
        if (f) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                currentImageData = ev.target.result;
                document.getElementById('preview').innerHTML = `<img src="${currentImageData}" style="max-width:100%; max-height:200px; border-radius:15px; margin:10px 0;">`;
                const nick = getCurrentNick();
                if (!nick) {
                    document.getElementById('ocrResult').innerHTML = `⚠️ Сначала сохрани ник в профиле`;
                    document.getElementById('ocrResult').style.display = 'block';
                    return;
                }
                const stats = await findMyStatsInScreenshot();
                if (stats) {
                    recognizedStats = stats;
                    document.getElementById('ocrResult').innerHTML = `✅ Найдено! Убийства: ${stats.kills} | % убийств: ${stats.killPercent}% | HS%: ${stats.hsPercent}% | Урон: ${stats.damage.toLocaleString()}`;
                    document.getElementById('ocrResult').style.display = 'block';
                    document.getElementById('sendBtn').style.display = 'block';
                } else {
                    document.getElementById('ocrResult').innerHTML = `❌ Не найден ник "${nick}" в таблице. Проверь ник в профиле.`;
                    document.getElementById('ocrResult').style.display = 'block';
                    document.getElementById('sendBtn').style.display = 'none';
                    recognizedStats = null;
                }
            };
            reader.readAsDataURL(f);
        }
    };

    async function sendStats() {
        if (!currentUser) { alert('Войдите'); return; }
        if (!recognizedStats) { alert('Сначала распознайте ник'); return; }
        if (!currentImageData) { alert('Сначала загрузите скриншот'); return; }
        
        const compressed = await (async (base64) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 800) { h = (h * 800) / w; w = 800; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = base64;
            });
        })(currentImageData);
        
        const payload = {
            username: currentUser.username,
            kills: recognizedStats.kills,
            killPercent: recognizedStats.killPercent,
            hsPercent: recognizedStats.hsPercent,
            damage: recognizedStats.damage,
            videoLink: document.getElementById('videoLink').value,
            screenshot: compressed
        };
        log('Отправка: ' + JSON.stringify(payload));
        const res = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await res.json();
        if (res.ok) {
            showMsg('uploadMsg', '✅ Статистика отправлена!', false);
            recognizedStats = null;
            document.getElementById('ocrResult').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('videoLink').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('preview').innerHTML = '';
            currentImageData = null;
            loadMyStats();
            if (currentUser.role === 'admin') loadAdminStats();
            loadLeaderboard();
        } else {
            showMsg('uploadMsg', `❌ Ошибка: ${result.error || 'неизвестная'}`, true);
        }
    }

    // Загрузка сохранённого пользователя
    const saved = localStorage.getItem('user');
    if (saved) {
        currentUser = JSON.parse(saved);
        document.getElementById('authBlock').style.display = 'none';
        document.getElementById('profileBlock').style.display = 'block';
        document.getElementById('uploadBlock').style.display = 'block';
        document.getElementById('currentNickDisplay').innerText = localNick || currentUser.gameNick || currentUser.username;
        if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'inline-block';
        loadLeaderboard();
        loadMyStats();
        if (currentUser.role === 'admin') loadAdminStats();
        log(`Загружен пользователь: ${currentUser.username} (${currentUser.role})`);
    } else {
        document.getElementById('currentNickDisplay').innerText = localNick;
        loadLeaderboard();
    }
</script>
</body>
</html>
