<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Stats | Трекер статистики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #141414 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 217, 102, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            color: #ffd966aa;
        }

        .telegram-link {
            background: #1a1a1a;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #ffaa33;
            transition: all 0.2s;
        }

        .telegram-link a {
            color: #ffaa33;
            text-decoration: none;
        }

        .telegram-link:hover {
            background: #ffaa33;
        }
        .telegram-link:hover a {
            color: #0a0a0a;
        }

        button {
            background: linear-gradient(135deg, #ffd966, #ffaa33);
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #111;
        }

        button:hover {
            transform: scale(0.97);
            box-shadow: 0 0 12px rgba(255, 200, 100, 0.5);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #ffaa33;
            color: #ffaa33;
        }

        .btn-outline:hover {
            background: #ffaa3310;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Cards */
        .card {
            background: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 217, 102, 0.2);
            transition: all 0.2s;
        }

        .card:hover {
            border-color: rgba(255, 217, 102, 0.5);
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #ffaa33;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #0a0a0a;
        }

        .upload-area:hover {
            background: #ffaa3310;
            border-color: #ffcc66;
        }

        .preview-container {
            margin-top: 1rem;
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 20px;
            border: 1px solid #ffaa33;
            cursor: pointer;
            transition: 0.2s;
        }

        .preview-image:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 170, 51, 0.3);
        }

        input {
            width: 100%;
            padding: 12px 18px;
            background: #1e1e1e;
            border: 1px solid #ffaa3350;
            border-radius: 40px;
            color: #ffdd99;
            margin: 10px 0;
        }

        input:focus {
            outline: none;
            border-color: #ffaa33;
            box-shadow: 0 0 8px #ffaa33;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #ffaa3350;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 28px;
            border-radius: 40px;
            cursor: pointer;
            background: #1a1a1a;
            color: #aaa;
            transition: all 0.2s;
        }

        .tab.active {
            background: #ffaa33;
            color: #0a0a0a;
            font-weight: bold;
        }

        .tab:hover {
            background: #ffaa3322;
            color: #ffcc66;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }

        .stat-card, .admin-card {
            background: #0e0e12;
            border-radius: 20px;
            padding: 1.2rem;
            border-left: 4px solid #ffaa33;
            transition: all 0.2s;
        }

        .stat-card:hover, .admin-card:hover {
            transform: translateY(-3px);
            background: #1a1a1a;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ffaa3350;
        }

        .stat-nick {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd966;
        }

        .stat-date {
            font-size: 0.7rem;
            color: #ffd966aa;
        }

        .stat-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }

        .stat-number {
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 16px;
            text-align: center;
            flex: 1;
            min-width: 70px;
        }

        .stat-number-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd966;
        }

        .stat-number-label {
            font-size: 0.7rem;
            color: #ffd966aa;
        }

        .stat-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .status-verified {
            background: #2e7d3240;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .status-pending {
            background: #ff980040;
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .screenshot-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .screenshot-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 0 8px #ffaa33;
        }

        /* Leaderboard */
        .leaderboard-card {
            background: #0e0e12;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }

        .leaderboard-card:hover {
            background: #1a1a1a;
            transform: translateX(5px);
        }

        .leaderboard-rank {
            font-size: 1.5rem;
            font-weight: bold;
            width: 55px;
            text-align: center;
        }

        .rank-1 { color: gold; text-shadow: 0 0 5px gold; }
        .rank-2 { color: silver; }
        .rank-3 { color: #cd7f32; }

        .leaderboard-info {
            flex: 1;
        }

        .leaderboard-name {
            font-size: 1rem;
            font-weight: bold;
        }

        .leaderboard-stats {
            display: flex;
            gap: 20px;
            margin-top: 4px;
            font-size: 0.75rem;
            color: #ffd966aa;
        }

        /* Profile */
        .profile-menu {
            position: relative;
            display: inline-block;
        }

        .profile-dropdown {
            position: absolute;
            right: 0;
            top: 45px;
            background: #1a1a1a;
            border: 1px solid #ffaa33;
            border-radius: 20px;
            padding: 1rem;
            width: 280px;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .nick-edit {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }

        .nick-edit input {
            margin: 0;
            padding: 8px 12px;
        }

        .stats-summary {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #ffaa3350;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stats-summary-item {
            background: #0a0a0a;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }

        .status-msg {
            padding: 10px;
            border-radius: 40px;
            margin-top: 12px;
            text-align: center;
        }

        .success {
            background: #2e7d3240;
            color: #4caf50;
            border: 1px solid #4caf50;
        }

        .error {
            background: #c6282840;
            color: #ff6b6b;
            border: 1px solid #c62828;
        }

        .debug-panel {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 11px;
            color: #5f5;
            max-height: 200px;
            overflow: auto;
            margin-top: 16px;
        }

        .refresh-btn {
            background: #ffaa33;
            color: #0a0a0a;
            margin-bottom: 15px;
            padding: 8px 20px;
        }

        @media (max-width: 700px) {
            .stats-grid { grid-template-columns: 1fr; }
            .leaderboard-card { flex-wrap: wrap; }
            .header-content { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo">
            <h1>⚔️ ARENA STATS</h1>
            <p>Трекер статистики | Общий лидерборд</p>
        </div>
        <div class="telegram-link">
            <a href="https://t.me/flikfak" target="_blank">🤝 @flikfak — сотрудничество</a>
        </div>
        <div id="authArea">
            <button id="showAuthBtn" onclick="showAuthModal()">🔐 Вход / Регистрация</button>
            <div id="userInfo" style="display: none;">
                <span id="userNameDisplay"></span>
                <div class="profile-menu" style="display: inline-block; margin-left: 12px;">
                    <button class="btn-outline" onclick="toggleProfile()">👤 Профиль</button>
                    <div id="profileDropdown" class="profile-dropdown" style="display: none;">
                        <div><strong>Игровой ник:</strong> <span id="currentNickDisplay">Flik_Homixide</span></div>
                        <div class="nick-edit">
                            <input type="text" id="nickInput" placeholder="Новый ник">
                            <button onclick="saveNick()">Сохранить</button>
                        </div>
                        <div class="stats-summary" id="userStatsSummary">
                            <div class="stats-summary-item">💥 Макс урон: —</div>
                            <div class="stats-summary-item">📊 Средний урон: —</div>
                            <div class="stats-summary-item">🎯 Всего убийств: —</div>
                        </div>
                        <button onclick="logout()" class="btn-outline" style="margin-top: 12px; width: 100%;">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- Auth Modal -->
    <div id="authModal" class="card" style="display: none;">
        <div class="tabs" style="border: none;">
            <div class="tab active" onclick="switchAuth('login')">Вход</div>
            <div class="tab" onclick="switchAuth('register')">Регистрация</div>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="doLogin()">Войти</button>
            <div id="loginMsg"></div>
        </div>
        <div id="registerForm" style="display: none;">
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="text" id="regGameNick" placeholder="Ник в игре" value="Flik_Homixide">
            <button onclick="doRegister()">Зарегистрироваться</button>
            <div id="regMsg"></div>
        </div>
    </div>

    <!-- Upload Section -->
    <div id="uploadBlock" class="card" style="display: none;">
        <h2 style="margin-bottom: 16px;">📸 Загрузить скриншот</h2>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 44px; margin-bottom: 8px;">📸</div>
            <p>Нажми или перетащи скриншот с таблицей статистики</p>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>
        <div id="preview" class="preview-container"></div>
        <input type="text" id="videoLink" placeholder="🎥 Ссылка на видео (YouTube/Twitch)">
        <div id="ocrResult" style="background: #0a0a0a; padding: 12px; border-radius: 20px; margin: 12px 0; display: none;"></div>
        <button id="sendBtn" style="display: none;" onclick="sendStats()">📤 Отправить статистику</button>
        <div id="uploadMsg"></div>
    </div>

    <!-- Main Tabs -->
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('leaderboard')">🏆 ЛИДЕРБОРД</div>
            <div class="tab" onclick="showTab('mystats')">📊 МОЯ СТАТИСТИКА</div>
            <div class="tab" id="adminTab" style="display: none;" onclick="showTab('admin')">🔧 АДМИН-ПАНЕЛЬ</div>
        </div>

        <div id="leaderboardTab" class="tab-content active">
            <input type="text" id="searchPlayer" placeholder="🔍 Поиск игрока..." style="margin-bottom: 20px;">
            <div id="leaderboardList"></div>
        </div>

        <div id="mystatsTab" class="tab-content">
            <div id="myStatsList"></div>
        </div>

        <div id="adminTabContent" class="tab-content">
            <button onclick="loadAdminStats()" class="refresh-btn" style="margin-bottom: 15px;">🔄 ОБНОВИТЬ АДМИН-ПАНЕЛЬ</button>
            <div id="adminList" class="stats-grid"></div>
            <div id="adminDebug" class="debug-panel"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let currentUser = null;
    let currentImageData = null;
    let recognizedStats = null;
    let ocrWorker = null;
    let localNick = localStorage.getItem('arena_nick') || 'Flik_Homixide';

    function log(msg) {
        const debugDiv = document.getElementById('adminDebug');
        if (debugDiv) {
            debugDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }
        console.log(msg);
    }

    function showMsg(elId, msg, isError) {
        const el = document.getElementById(elId);
        if (el) {
            el.innerHTML = `<div class="status-msg ${isError ? 'error' : 'success'}">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 4000);
        }
    }

    function saveNick() {
        const newNick = document.getElementById('nickInput').value.trim();
        if (!newNick) { showMsg('uploadMsg', '❌ Введите ник', true); return; }
        localNick = newNick;
        localStorage.setItem('arena_nick', localNick);
        document.getElementById('currentNickDisplay').innerText = localNick;
        document.getElementById('nickInput').value = '';
        showMsg('uploadMsg', `✅ Ник сохранён: ${localNick}`, false);
    }

    function getCurrentNick() {
        return localNick || (currentUser?.gameNick) || (currentUser?.username) || '';
    }

    // Auth
    async function doRegister() {
        const payload = { username: document.getElementById('regUsername').value, password: document.getElementById('regPassword').value, gameNick: document.getElementById('regGameNick').value };
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            showMsg('regMsg', '✅ Регистрация успешна! Войдите.', false);
            switchAuth('login');
        } else {
            showMsg('regMsg', `❌ ${data.error}`, true);
        }
    }

    async function doLogin() {
        const payload = { username: document.getElementById('loginUsername').value, password: document.getElementById('loginPassword').value };
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('uploadBlock').style.display = 'block';
            document.getElementById('showAuthBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'inline-block';
            document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.username}`;
            document.getElementById('currentNickDisplay').innerText = localNick || currentUser.gameNick || currentUser.username;
            if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'inline-block';
            log(`✅ Вход: ${currentUser.username} (${currentUser.role})`);
            loadLeaderboard();
            loadMyStats();
            loadAdminStats();
        } else {
            showMsg('loginMsg', `❌ ${data.error}`, true);
        }
    }

    function logout() { currentUser = null; localStorage.removeItem('user'); location.reload(); }
    function toggleProfile() { const d = document.getElementById('profileDropdown'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
    function showAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
    function switchAuth(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
    }
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        if (tab === 'leaderboard') loadLeaderboard();
        if (tab === 'mystats') loadMyStats();
        if (tab === 'admin') loadAdminStats();
    }

    // Leaderboard
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';
            if (!data.length) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">🏆 Пока нет данных</div>';
                return;
            }
            const searchTerm = document.getElementById('searchPlayer')?.value.toLowerCase() || '';
            const filtered = data.filter(p => (p.game_nick || p.username).toLowerCase().includes(searchTerm));
            filtered.slice(0, 30).forEach((p, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                container.innerHTML += `
                    <div class="leaderboard-card">
                        <div class="leaderboard-rank ${rankClass}">#${i+1}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${escapeHtml(p.game_nick || p.username)}</div>
                            <div class="leaderboard-stats">
                                <span>💀 ${p.kills}</span>
                                <span>⚡ ${p.damage?.toLocaleString()}</span>
                            </div>
                        </div>
                        ${p.video_link ? `<a href="${p.video_link}" target="_blank" style="color:#ffd966;">🎥</a>` : ''}
                    </div>
                `;
            });
        } catch(e) { log('Leaderboard error: ' + e); }
    }

    // My Stats
    async function loadMyStats() {
        if (!currentUser) return;
        try {
            const res = await fetch('/api/stats/my', { headers: { username: currentUser.username } });
            const stats = await res.json();
            const container = document.getElementById('myStatsList');
            container.innerHTML = '';
            if (!stats.length) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">📭 Нет статистики. Загрузите скриншот!</div>';
                return;
            }
            stats.forEach(s => {
                container.innerHTML += `
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-nick">${escapeHtml(s.game_nick || s.username)}</span>
                            <span class="stat-date">${new Date(s.date).toLocaleDateString()}</span>
                        </div>
                        <div class="stat-numbers">
                            <div class="stat-number">
                                <div class="stat-number-value">${s.kills}</div>
                                <div class="stat-number-label">💀</div>
                            </div>
                            <div class="stat-number">
                                <div class="stat-number-value">${s.kill_percent || 0}%</div>
                                <div class="stat-number-label">🎯</div>
                            </div>
                            <div class="stat-number">
                                <div class="stat-number-value">${s.hs_percent || 0}%</div>
                                <div class="stat-number-label">💥</div>
                            </div>
                            <div class="stat-number">
                                <div class="stat-number-value">${s.damage?.toLocaleString() || 0}</div>
                                <div class="stat-number-label">⚡</div>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div>
                                <span class="stat-status ${s.verified ? 'status-verified' : 'status-pending'}">
                                    ${s.verified ? '✅ Подтверждена' : '⏳ Ожидает проверки'}
                                </span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                ${s.video_link ? `<a href="${s.video_link}" target="_blank" style="color:#ffd966;">🎥 Видео</a>` : ''}
                                ${s.screenshot ? `<img src="${s.screenshot}" class="screenshot-thumb" onclick="showFullImage('${s.screenshot}')">` : ''}
                                ${!s.verified ? `<button onclick="deleteMyStat(${s.id})" style="background:#c62828; padding:4px 12px;">🗑️</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch(e) { log('MyStats error: ' + e); }
    }

    async function deleteMyStat(id) {
        if (!confirm('Удалить эту статистику?')) return;
        await fetch(`/api/stats/${id}`, { method: 'DELETE' });
        loadMyStats();
        loadLeaderboard();
        showMsg('uploadMsg', '✅ Статистика удалена', false);
    }

    // ADMIN PANEL - FIXED
    async function loadAdminStats() {
        if (!currentUser) {
            document.getElementById('adminList').innerHTML = '<div style="text-align:center; padding:40px;">🔐 Войдите в аккаунт</div>';
            log('❌ Не залогинен');
            return;
        }
        if (currentUser.role !== 'admin') {
            document.getElementById('adminList').innerHTML = '<div style="text-align:center; padding:40px;">🔐 Требуются права администратора</div>';
            log('❌ Не админ');
            return;
        }
        
        log('🔄 Загрузка админ-панели...');
        try {
            const res = await fetch('/api/stats/all');
            const allStats = await res.json();
            log(`📊 Получено ${allStats.length} записей`);
            
            const unverified = allStats.filter(s => !s.verified);
            log(`⏳ Неподтверждённых: ${unverified.length}`);
            
            const container = document.getElementById('adminList');
            container.innerHTML = '';
            
            if (unverified.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">✅ Нет неподтверждённой статистики</div>';
                log('✅ Нет записей');
                return;
            }
            
            for (let s of unverified) {
                const card = document.createElement('div');
                card.className = 'admin-card';
                card.innerHTML = `
                    <div class="stat-header">
                        <span class="stat-nick">${escapeHtml(s.game_nick || s.username)}</span>
                        <span class="stat-date">${new Date(s.date).toLocaleDateString()}</span>
                    </div>
                    <div class="stat-numbers">
                        <div class="stat-number">
                            <div class="stat-number-value">${s.kills}</div>
                            <div class="stat-number-label">💀</div>
                        </div>
                        <div class="stat-number">
                            <div class="stat-number-value">${s.kill_percent || 0}%</div>
                            <div class="stat-number-label">🎯</div>
                        </div>
                        <div class="stat-number">
                            <div class="stat-number-value">${s.hs_percent || 0}%</div>
                            <div class="stat-number-label">💥</div>
                        </div>
                        <div class="stat-number">
                            <div class="stat-number-value">${s.damage?.toLocaleString() || 0}</div>
                            <div class="stat-number-label">⚡</div>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px;">
                        <div>
                            ${s.video_link ? `<a href="${s.video_link}" target="_blank" style="color:#ffd966;">🎥 Видео</a>` : ''}
                            ${s.screenshot ? `<img src="${s.screenshot}" class="screenshot-thumb" onclick="showFullImage('${s.screenshot}')">` : ''}
                        </div>
                        <div>
                            <button onclick="verifyStat(${s.id})" style="background:#2e7d32;">✅ Подтвердить</button>
                            <button onclick="deleteStat(${s.id})" style="background:#c62828;">🗑️ Отклонить</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
            log(`✅ Отображено ${unverified.length} карточек`);
        } catch(e) {
            log(`❌ Ошибка: ${e.message}`);
            document.getElementById('adminList').innerHTML = `<div style="text-align:center; padding:40px; color:#ff6b6b;">❌ Ошибка: ${e.message}</div>`;
        }
    }

    async function verifyStat(id) {
        log(`🔧 Подтверждение ${id}`);
        await fetch(`/api/stats/${id}/verify`, { method: 'PUT' });
        loadAdminStats();
        loadLeaderboard();
        loadMyStats();
        showMsg('uploadMsg', '✅ Подтверждено', false);
    }

    async function deleteStat(id) {
        if (!confirm('Удалить эту статистику?')) return;
        log(`🗑️ Удаление ${id}`);
        await fetch(`/api/stats/${id}`, { method: 'DELETE' });
        loadAdminStats();
        loadLeaderboard();
        loadMyStats();
        showMsg('uploadMsg', '✅ Удалено', false);
    }

    function showFullImage(src) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<img src="${src}">`;
        modal.onclick = () => modal.remove();
        document.body.appendChild(modal);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // OCR
    async function findMyStatsInScreenshot() {
        if (!currentImageData) return null;
        const nickToFind = getCurrentNick();
        if (!nickToFind) return null;
        if (!ocrWorker) {
            log('🔄 Загрузка нейронки...');
            ocrWorker = await Tesseract.createWorker('rus+eng', 1);
            await ocrWorker.setParameters({
                tessedit_char_whitelist: '0123456789%abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ_',
                tessedit_pageseg_mode: '6'
            });
            log('✅ Нейронка готова');
        }
        log('🔍 Распознавание...');
        const { data: { text } } = await ocrWorker.recognize(currentImageData);
        const lines = text.split('\n');
        for (let line of lines) {
            if (line.toLowerCase().includes(nickToFind.toLowerCase())) {
                const numbers = line.match(/\d+/g);
                if (numbers && numbers.length >= 4) {
                    log(`✅ Найдено: ${line}`);
                    return {
                        kills: parseInt(numbers[0]),
                        killPercent: parseFloat(numbers[1]),
                        hsPercent: parseFloat(numbers[2]),
                        damage: parseInt(numbers[3])
                    };
                }
            }
        }
        return null;
    }

    document.getElementById('fileInput').onchange = async (e) => {
        const f = e.target.files[0];
        if (f) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                currentImageData = ev.target.result;
                document.getElementById('preview').innerHTML = `<img src="${currentImageData}" class="preview-image" onclick="showFullImage('${currentImageData}')">`;
                const nick = getCurrentNick();
                if (!nick) {
                    document.getElementById('ocrResult').innerHTML = `⚠️ Сначала сохраните ник в профиле`;
                    document.getElementById('ocrResult').style.display = 'block';
                    return;
                }
                const stats = await findMyStatsInScreenshot();
                if (stats) {
                    recognizedStats = stats;
                    document.getElementById('ocrResult').innerHTML = `✅ Найдено! 💀${stats.kills} | 🎯${stats.killPercent}% | 💥${stats.hsPercent}% | ⚡${stats.damage.toLocaleString()}`;
                    document.getElementById('ocrResult').style.display = 'block';
                    document.getElementById('sendBtn').style.display = 'block';
                } else {
                    document.getElementById('ocrResult').innerHTML = `❌ Не найден ник "${nick}" в таблице. Проверьте ник в профиле.`;
                    document.getElementById('ocrResult').style.display = 'block';
                    document.getElementById('sendBtn').style.display = 'none';
                    recognizedStats = null;
                }
            };
            reader.readAsDataURL(f);
        }
    };

    async function sendStats() {
        if (!currentUser) { alert('Войдите в аккаунт'); return; }
        if (!recognizedStats) { alert('Сначала распознайте ник'); return; }
        const compressed = await new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 800) { h = (h * 800) / w; w = 800; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = currentImageData;
        });
        const payload = {
            username: currentUser.username,
            kills: recognizedStats.kills,
            killPercent: recognizedStats.killPercent,
            hsPercent: recognizedStats.hsPercent,
            damage: recognizedStats.damage,
            videoLink: document.getElementById('videoLink').value,
            screenshot: compressed
        };
        const res = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (res.ok) {
            showMsg('uploadMsg', '✅ Статистика отправлена!', false);
            recognizedStats = null;
            document.getElementById('ocrResult').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('videoLink').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('preview').innerHTML = '';
            currentImageData = null;
            loadMyStats();
            loadAdminStats();
            loadLeaderboard();
        } else {
            const err = await res.json();
            showMsg('uploadMsg', `❌ Ошибка: ${err.error || 'неизвестная'}`, true);
        }
    }

    // Init
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('uploadBlock').style.display = 'block';
        document.getElementById('showAuthBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'inline-block';
        document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.username}`;
        document.getElementById('currentNickDisplay').innerText = localNick || currentUser.gameNick || currentUser.username;
        if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'inline-block';
        log(`Загружен пользователь: ${currentUser.username} (${currentUser.role})`);
        loadLeaderboard();
        loadMyStats();
        loadAdminStats();
    } else {
        document.getElementById('currentNickDisplay').innerText = localNick;
        loadLeaderboard();
    }

    document.getElementById('searchPlayer')?.addEventListener('input', () => loadLeaderboard());
</script>
</body>
