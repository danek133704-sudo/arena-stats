<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena Stats</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body {
    margin:0;
    font-family:system-ui;
    background: radial-gradient(circle at top, #1b2838, #0b0f14);
    color:#fff;
}

.container {
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card {
    background:#16202a;
    border:1px solid #2a3f55;
    border-radius:16px;
    padding:20px;
    margin-bottom:20px;
}

input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #2a3f55;
    background:#0f1720;
    color:#fff;
}

button {
    background:#ff5500;
    border:none;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    color:#fff;
    font-weight:bold;
}

button:hover {
    opacity:0.9;
}

.tabs {
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.tab {
    padding:8px 16px;
    background:#1a2633;
    border-radius:10px;
    cursor:pointer;
}

.tab.active {
    background:#ff5500;
}

.stat {
    background:#0f1720;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.preview {
    max-width:100%;
    border-radius:10px;
    margin-top:10px;
}

.msg {
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

.success { background:#2e7d32; }
.error { background:#c62828; }

.admin-btns button {
    margin-right:5px;
}
</style>
</head>

<body>

<div class="container">

<!-- AUTH -->
<div class="card" id="authBlock">
<h2>🔐 Вход / Регистрация</h2>

<div class="tabs">
<div class="tab active" onclick="switchAuth('login')">Вход</div>
<div class="tab" onclick="switchAuth('register')">Регистрация</div>
</div>

<div id="loginForm">
<input id="loginUser" placeholder="Логин">
<input id="loginPass" type="password" placeholder="Пароль">
<button onclick="login()">Войти</button>
<div id="loginMsg"></div>
</div>

<div id="registerForm" style="display:none;">
<input id="regUser" placeholder="Логин">
<input id="regPass" type="password" placeholder="Пароль">
<input id="regNick" placeholder="Игровой ник">
<button onclick="register()">Создать аккаунт</button>
<div id="regMsg"></div>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
👤 <span id="userName"></span>
<button onclick="logout()" style="float:right;">Выйти</button>
</div>

<div class="tabs">
<div class="tab active" onclick="openTab('leaderboard')">🏆 Лидерборд</div>
<div class="tab" onclick="openTab('my')">📊 Мои</div>
<div class="tab" onclick="openTab('upload')">📸 Загрузка</div>
<div class="tab" id="adminTab" onclick="openTab('admin')" style="display:none;">🔧 Админ</div>
</div>

<div id="leaderboard"></div>
<div id="my" style="display:none;"></div>

<div id="upload" style="display:none;">
<div class="card">
<input type="file" id="fileInput">
<input id="videoLink" placeholder="Ссылка на видео">

<img id="preview" class="preview" style="display:none;">

<button onclick="runOCR()">🔍 Распознать</button>

<div id="ocrResult"></div>

<button id="sendBtn" onclick="sendStats()" style="display:none;">📤 Отправить</button>
</div>
</div>

<div id="admin" style="display:none;"></div>

</div>
</div>

<script>
let token = localStorage.getItem('token');
let user = null;
let recognized = null;

function showMsg(id,msg,ok=true){
document.getElementById(id).innerHTML=
`<div class="msg ${ok?'success':'error'}">${msg}</div>`;
}

function switchAuth(type){
loginForm.style.display = type==='login'?'block':'none';
registerForm.style.display = type==='register'?'block':'none';
}

async function register(){
const res = await fetch('/api/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:regUser.value,
password:regPass.value,
gameNick:regNick.value
})
});

const data = await res.json();
if(!res.ok) return showMsg('regMsg',data.error,false);

showMsg('regMsg','Аккаунт создан');
}

async function login(){
const res = await fetch('/api/login',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
username:loginUser.value,
password:loginPass.value
})
});

const data = await res.json();
if(!res.ok) return showMsg('loginMsg',data.error,false);

token = data.token;
user = data.user;

localStorage.setItem('token',token);

init();
}

function logout(){
localStorage.clear();
location.reload();
}

function init(){
authBlock.style.display='none';
app.style.display='block';
userName.innerText=user.username;

if(user.role==='admin'){
adminTab.style.display='block';
}

loadLeaderboard();
loadMy();
loadAdmin();
}

function openTab(tab){
['leaderboard','my','upload','admin'].forEach(t=>{
document.getElementById(t).style.display='none';
});
document.getElementById(tab).style.display='block';

if(tab==='leaderboard') loadLeaderboard();
if(tab==='my') loadMy();
if(tab==='admin') loadAdmin();
}

async function loadLeaderboard(){
leaderboard.innerHTML='⏳ Загрузка...';

const res = await fetch('/api/leaderboard');
const data = await res.json();

leaderboard.innerHTML = data.map(p=>`
<div class="stat">
<b>${p.game_nick}</b><br>
💀 ${p.kills} | ⚡ ${p.damage}
</div>`).join('');
}

async function loadMy(){
const res = await fetch('/api/stats/my',{
headers:{Authorization:token}
});

const data = await res.json();

my.innerHTML = data.map(s=>`
<div class="stat">
💀 ${s.kills} | ⚡ ${s.damage}
${!s.verified?'⏳':''}
</div>`).join('');
}

async function loadAdmin(){
if(user.role!=='admin') return;

const res = await fetch('/api/stats/all',{
headers:{Authorization:token}
});

const data = await res.json();

const list = data.filter(s=>!s.verified);

if(!list.length){
admin.innerHTML='✅ Нет заявок';
return;
}

admin.innerHTML = list.map(s=>`
<div class="stat">
<b>${s.game_nick}</b><br>
💀 ${s.kills} | ⚡ ${s.damage}
<div class="admin-btns">
<button onclick="verify(${s.id})">✅</button>
<button onclick="del(${s.id})">❌</button>
</div>
</div>`).join('');
}

async function verify(id){
await fetch('/api/stats/'+id+'/verify',{
method:'PUT',
headers:{Authorization:token}
});
loadAdmin(); loadLeaderboard();
}

async function del(id){
await fetch('/api/stats/'+id,{
method:'DELETE',
headers:{Authorization:token}
});
loadAdmin(); loadLeaderboard();
}

fileInput.onchange = e=>{
const file = e.target.files[0];
if(file){
preview.src = URL.createObjectURL(file);
preview.style.display='block';
}
};

async function runOCR(){
const file = fileInput.files[0];
if(!file) return alert('Выбери файл');

const worker = await Tesseract.createWorker('eng');
const { data } = await worker.recognize(file);

ocrResult.innerText = data.text;

const nums = data.text.match(/\d+/g);

if(nums && nums.length>=4){
recognized = {
kills:+nums[0],
killPercent:+nums[1],
hsPercent:+nums[2],
damage:+nums[3]
};

sendBtn.style.display='block';
}
}

async function sendStats(){
await fetch('/api/stats',{
method:'POST',
headers:{
'Content-Type':'application/json',
Authorization:token
},
body:JSON.stringify({
...recognized,
videoLink:videoLink.value,
screenshot:preview.src
})
});

alert('Отправлено');

sendBtn.style.display='none';
ocrResult.innerHTML='';
preview.style.display='none';

loadMy();
loadAdmin();
loadLeaderboard();
}

const saved = localStorage.getItem('token');
if(saved){
token = saved;
user = JSON.parse(atob(token.split('.')[1]));
init();
}
</script>

</body>
</html>
