<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Stats</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0a0a0a; color: #ffd966; min-height: 100vh; }
        .header { background: #1a1a1a; padding: 1rem 2rem; border-bottom: 1px solid #ffd966; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, #ffd966, #ffaa33); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .telegram-link { background: #2c2c2c; padding: 6px 18px; border-radius: 40px; border: 1px solid #ffd966; }
        .telegram-link a { color: #ffd966; text-decoration: none; }
        button { background: #ffd966; border: none; padding: 8px 22px; border-radius: 40px; font-weight: bold; cursor: pointer; color: #0a0a0a; transition: 0.2s; }
        button:hover { transform: scale(0.97); background: #ffaa33; }
        .btn-outline { background: transparent; border: 1px solid #ffd966; color: #ffd966; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .card { background: #1a1a1a; border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #ffd96633; }
        .upload-area { border: 2px dashed #ffd966; border-radius: 20px; padding: 2rem; text-align: center; cursor: pointer; background: #0a0a0a; transition: 0.2s; }
        .upload-area:hover { background: #ffaa3310; border-color: #ffcc66; }
        .upload-area.dragover { background: #ffaa3320; border-color: #ffaa33; }
        input { width: 100%; padding: 12px; background: #2c2c2c; border: 1px solid #ffd96633; border-radius: 40px; color: #ffd966; margin: 8px 0; }
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 1px solid #ffd96633; }
        .tab { padding: 8px 28px; border-radius: 40px; cursor: pointer; background: #2c2c2c; color: #aaa; transition: 0.2s; }
        .tab.active { background: #ffd966; color: #0a0a0a; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .admin-card { background: #0a0a0a; border-radius: 20px; padding: 1rem; border-left: 4px solid #ffd966; transition: 0.2s; margin-bottom: 15px; }
        .admin-card:hover { background: #2c2c2c; transform: translateX(5px); }
        .stat-header { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #ffd96633; }
        .stat-nick { font-size: 1.1rem; font-weight: bold; color: #ffd966; }
        .stat-date { font-size: 0.7rem; color: #ffd966aa; }
        .stat-numbers { display: flex; gap: 12px; margin: 10px 0; flex-wrap: wrap; }
        .stat-number { background: #1a1a1a; padding: 8px 12px; border-radius: 16px; text-align: center; flex: 1; min-width: 70px; }
        .stat-number-value { font-size: 1.3rem; font-weight: bold; color: #ffd966; }
        .stat-number-label { font-size: 0.7rem; color: #ffd966aa; }
        .screenshot-thumb { width: 45px; height: 45px; border-radius: 10px; cursor: pointer; object-fit: cover; }
        .leaderboard-card { background: #0a0a0a; border-radius: 16px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .leaderboard-rank { font-size: 1.4rem; font-weight: bold; width: 45px; text-align: center; }
        .rank-1 { color: gold; } .rank-2 { color: silver; } .rank-3 { color: #cd7f32; }
        .profile-menu { position: relative; display: inline-block; }
        .profile-dropdown { position: absolute; right: 0; top: 45px; background: #1a1a1a; border: 1px solid #ffd966; border-radius: 20px; padding: 1rem; width: 260px; z-index: 200; }
        .nick-edit { display: flex; gap: 8px; margin: 10px 0; }
        .nick-edit input { margin: 0; padding: 6px 10px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 16px; }
        .status-msg { padding: 8px; border-radius: 40px; margin-top: 10px; text-align: center; }
        .success { background: #2e7d3240; color: #4caf50; border: 1px solid #4caf50; }
        .error { background: #c6282840; color: #ff6b6b; border: 1px solid #c62828; }
        .auth-modal { max-width: 450px; margin: 0 auto; text-align: center; background: #1a1a1a; border-radius: 28px; padding: 2rem; border: 1px solid #ffd966; }
        .auth-tabs { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
        .auth-tab { padding: 8px 32px; border-radius: 40px; cursor: pointer; background: #2c2c2c; color: #aaa; }
        .auth-tab.active { background: #ffd966; color: #0a0a0a; font-weight: bold; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .auth-form input { width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #ffd96633; border-radius: 40px; color: #ffd966; margin: 10px 0; }
        .preview-image { max-width: 100%; max-height: 200px; border-radius: 16px; cursor: pointer; margin-top: 10px; }
        .admin-section { margin-top: 20px; padding-top: 20px; border-top: 2px solid #ffd966; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ffd966; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 700px) { .stats-grid { grid-template-columns: 1fr; } .header-content { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo"><h1>⚔️ ARENA STATS</h1><p>Трекер статистики | Общий лидерборд</p></div>
        <div class="telegram-link"><a href="https://t.me/flikfak" target="_blank">🤝 @flikfak — сотрудничество</a></div>
        <div id="authArea">
            <button id="showAuthBtn" onclick="showAuthModal()">🔐 Вход / Регистрация</button>
            <div id="userInfo" style="display: none;">
                <span id="userNameDisplay"></span>
                <div class="profile-menu" style="display: inline-block; margin-left: 12px;">
                    <button class="btn-outline" onclick="toggleProfile()">👤 Профиль</button>
                    <div id="profileDropdown" class="profile-dropdown" style="display: none;">
                        <div><strong>Игровой ник:</strong> <span id="currentNickDisplay">Flik_Homixide</span></div>
                        <div class="nick-edit"><input type="text" id="nickInput" placeholder="Новый ник"><button onclick="saveNick()">Сохранить</button></div>
                        <button onclick="logout()" class="btn-outline" style="margin-top: 10px; width: 100%;">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="authModal" class="card" style="display: none;">
        <div class="auth-modal">
            <div class="auth-tabs"><div class="auth-tab active" onclick="switchAuth('login')">Вход</div><div class="auth-tab" onclick="switchAuth('register')">Регистрация</div></div>
            <div id="loginForm" class="auth-form active">
                <input type="text" id="loginUsername" placeholder="Логин"><input type="password" id="loginPassword" placeholder="Пароль"><button onclick="doLogin()">Войти</button><div id="loginMsg"></div>
            </div>
            <div id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Логин"><input type="password" id="regPassword" placeholder="Пароль"><input type="text" id="regGameNick" placeholder="Ник в игре" value="Flik_Homixide"><button onclick="doRegister()">Зарегистрироваться</button><div id="regMsg"></div>
            </div>
        </div>
    </div>

    <div id="uploadBlock" class="card" style="display: none;">
        <h2>📸 Загрузить скриншот</h2>
        <div class="upload-area" id="uploadArea">
            <div style="font-size: 40px;">📸</div>
            <p>Нажми или перетащи скриншот</p>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>
        <div id="preview" style="text-align: center;"></div>
        <input type="text" id="videoLink" placeholder="🎥 Ссылка на видео">
        <div id="ocrResult" style="background: #0a0a0a; padding: 12px; border-radius: 20px; margin: 12px 0; display: none;"></div>
        <button id="sendBtn" style="display: none;" onclick="sendStats()">📤 Отправить</button>
        <div id="uploadMsg"></div>
    </div>

    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('leaderboard')">🏆 ЛИДЕРБОРД</div>
            <div class="tab" onclick="showTab('mystats')">📊 МОЯ СТАТИСТИКА</div>
            <div class="tab" id="adminTab" style="display: none;" onclick="showTab('admin')">🔧 АДМИН-ПАНЕЛЬ</div>
        </div>
        <div id="leaderboardTab" class="tab-content active"><input type="text" id="searchPlayer" placeholder="🔍 Поиск игрока..." style="margin-bottom: 15px;"><div id="leaderboardList"></div></div>
        <div id="mystatsTab" class="tab-content"><div id="myStatsList"></div></div>
        <div id="adminTabContent" class="tab-content"></div>
    </div>

    <div id="adminPanelBlock" class="card admin-section" style="display: none;">
        <h2 style="color: #ffd966; margin-bottom: 20px;">🔧 АДМИН-ПАНЕЛЬ (неподтверждённая статистика)</h2>
        <button onclick="loadAdminStatsDirect()" style="margin-bottom: 15px; background:#ffaa33;">🔄 ОБНОВИТЬ</button>
        <div id="adminDirectList" class="stats-grid"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let currentUser = null, currentImageData = null, recognizedStats = null, ocrWorker = null;
    let localNick = localStorage.getItem('arena_nick') || 'Flik_Homixide';

    // ========== УСИЛЕННАЯ ПРЕДОБРАБОТКА ИЗОБРАЖЕНИЯ ==========
    function enhanceImage(base64) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                // Масштабируем для лучшего распознавания (увеличиваем в 2 раза)
                const scale = 2;
                const canvas = document.createElement('canvas');
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                
                // Рисуем увеличенное изображение с интерполяцией
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Получаем пиксели
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imageData.data;
                
                // 1. Автоконтраст (растягиваем гистограмму)
                let min = 255, max = 0;
                for (let i = 0; i < data.length; i += 4) {
                    const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    if (brightness < min) min = brightness;
                    if (brightness > max) max = brightness;
                }
                const range = max - min;
                
                // 2. Применяем автоконтраст и делаем ч/б
                for (let i = 0; i < data.length; i += 4) {
                    let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    // Нормализация
                    if (range > 0) {
                        brightness = ((brightness - min) / range) * 255;
                    }
                    // Адаптивный порог с локальным усреднением
                    const value = brightness > 140 ? 255 : 0;
                    data[i] = value;
                    data[i+1] = value;
                    data[i+2] = value;
                }
                ctx.putImageData(imageData, 0, 0);
                
                // 3. Медианный фильтр для удаления шума (3x3)
                const width = canvas.width;
                const height = canvas.height;
                const filteredData = ctx.getImageData(0, 0, width, height);
                const filteredPixels = filteredData.data;
                
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const neighbors = [];
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const idx = ((y + dy) * width + (x + dx)) * 4;
                                neighbors.push(data[idx]);
                            }
                        }
                        neighbors.sort((a, b) => a - b);
                        const median = neighbors[4];
                        const idx = (y * width + x) * 4;
                        filteredPixels[idx] = median;
                        filteredPixels[idx+1] = median;
                        filteredPixels[idx+2] = median;
                    }
                }
                ctx.putImageData(filteredData, 0, 0);
                
                // 4. Повышение резкости (unsharp mask)
                const sharpData = ctx.getImageData(0, 0, width, height);
                const sharpPixels = sharpData.data;
                
                // Создаём размытую версию
                const blurred = ctx.getImageData(0, 0, width, height);
                const blurredPixels = blurred.data;
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        let sum = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                const idx = ((y + dy) * width + (x + dx)) * 4;
                                sum += filteredPixels[idx];
                            }
                        }
                        const idx = (y * width + x) * 4;
                        blurredPixels[idx] = sum / 9;
                        blurredPixels[idx+1] = sum / 9;
                        blurredPixels[idx+2] = sum / 9;
                    }
                }
                
                // Повышение резкости: оригинал + (оригинал - размытое) * коэффициент
                for (let i = 0; i < sharpPixels.length; i += 4) {
                    const original = filteredPixels[i];
                    const blur = blurredPixels[i];
                    let sharpened = original + (original - blur) * 1.5;
                    sharpened = Math.min(255, Math.max(0, sharpened));
                    sharpPixels[i] = sharpened;
                    sharpPixels[i+1] = sharpened;
                    sharpPixels[i+2] = sharpened;
                }
                ctx.putImageData(sharpData, 0, 0);
                
                resolve(canvas.toDataURL('image/png'));
            };
            img.src = base64;
        });
    }

    function showMsg(elId, msg, isError) { 
        const el = document.getElementById(elId); 
        if (el) { 
            el.innerHTML = `<div class="status-msg ${isError ? 'error' : 'success'}">${msg}</div>`; 
            setTimeout(() => el.innerHTML = '', 4000); 
        } 
    }
    
    async function saveNick() {
        const newNick = document.getElementById('nickInput').value.trim();
        if (!newNick) return;
        if (!currentUser) {
            localNick = newNick;
            localStorage.setItem('arena_nick', localNick);
            document.getElementById('currentNickDisplay').innerText = localNick;
            showMsg('uploadMsg', `✅ Ник сохранён локально: ${localNick}`, false);
            return;
        }
        const res = await fetch('/api/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser.username, gameNick: newNick })
        });
        if (res.ok) {
            currentUser.gameNick = newNick;
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('currentNickDisplay').innerText = newNick;
            showMsg('uploadMsg', `✅ Ник обновлён: ${newNick}`, false);
            loadLeaderboard();
            loadMyStats();
            if (currentUser.role === 'admin') loadAdminStatsDirect();
        } else {
            showMsg('uploadMsg', `❌ Ошибка`, true);
        }
        document.getElementById('nickInput').value = '';
    }
    
    function getCurrentNick() { 
        if (currentUser?.gameNick) return currentUser.gameNick;
        if (localNick) return localNick;
        return currentUser?.username || '';
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function showFullImage(src) { const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<img src="${src}">`; m.onclick = () => m.remove(); document.body.appendChild(m); }

    async function doRegister() {
        const payload = { username: document.getElementById('regUsername').value, password: document.getElementById('regPassword').value, gameNick: document.getElementById('regGameNick').value };
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) { showMsg('regMsg', '✅ Регистрация успешна! Войдите.', false); switchAuth('login'); }
        else showMsg('regMsg', `❌ ${data.error}`, true);
    }

    async function doLogin() {
        const payload = { username: document.getElementById('loginUsername').value, password: document.getElementById('loginPassword').value };
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('uploadBlock').style.display = 'block';
            document.getElementById('showAuthBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'inline-block';
            document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.username}`;
            document.getElementById('currentNickDisplay').innerText = currentUser.gameNick || currentUser.username;
            if (currentUser.role === 'admin') {
                document.getElementById('adminTab').style.display = 'inline-block';
                document.getElementById('adminPanelBlock').style.display = 'block';
                loadAdminStatsDirect();
            }
            loadLeaderboard(); loadMyStats();
        } else showMsg('loginMsg', `❌ ${data.error}`, true);
    }

    function logout() { currentUser = null; localStorage.removeItem('user'); location.reload(); }
    function toggleProfile() { const d = document.getElementById('profileDropdown'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
    function showAuthModal() { document.getElementById('authModal').style.display = 'flex'; }
    function switchAuth(type) {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        if (type === 'login') { document.querySelectorAll('.auth-tab')[0].classList.add('active'); document.getElementById('loginForm').classList.add('active'); }
        else { document.querySelectorAll('.auth-tab')[1].classList.add('active'); document.getElementById('registerForm').classList.add('active'); }
    }
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        if (tab === 'leaderboard') loadLeaderboard();
        if (tab === 'mystats') loadMyStats();
    }

    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';
            if (!data.length) { container.innerHTML = '<div style="text-align:center; padding:40px;">🏆 Пока нет данных</div>'; return; }
            const search = document.getElementById('searchPlayer')?.value.toLowerCase() || '';
            const filtered = data.filter(p => (p.game_nick || p.username).toLowerCase().includes(search));
            filtered.slice(0, 30).forEach((p, i) => {
                let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                container.innerHTML += `<div class="leaderboard-card"><div class="leaderboard-rank ${rankClass}">#${i+1}</div><div><div><b>${escapeHtml(p.game_nick || p.username)}</b></div><div>💀 ${p.kills} | ⚡ ${p.damage?.toLocaleString()}</div></div></div>`;
            });
        } catch(e) { console.log(e); }
    }

    async function loadMyStats() {
        if (!currentUser) return;
        try {
            const res = await fetch('/api/stats/my', { headers: { username: currentUser.username } });
            const stats = await res.json();
            const container = document.getElementById('myStatsList');
            container.innerHTML = '';
            if (!stats.length) { container.innerHTML = '<div style="text-align:center; padding:40px;">📭 Нет статистики</div>'; return; }
            stats.forEach(s => {
                container.innerHTML += `<div class="admin-card"><div class="stat-header"><span class="stat-nick">${escapeHtml(s.game_nick || s.username)}</span><span class="stat-date">${new Date(s.date).toLocaleDateString()}</span></div><div class="stat-numbers"><div class="stat-number"><div class="stat-number-value">${s.kills}</div><div class="stat-number-label">💀</div></div><div class="stat-number"><div class="stat-number-value">${s.kill_percent || 0}%</div><div class="stat-number-label">🎯</div></div><div class="stat-number"><div class="stat-number-value">${s.hs_percent || 0}%</div><div class="stat-number-label">💥</div></div><div class="stat-number"><div class="stat-number-value">${s.damage?.toLocaleString() || 0}</div><div class="stat-number-label">⚡</div></div></div><div><span style="background:#2e7d3240;color:#4caf50;padding:4px 12px;border-radius:20px;">${s.verified ? '✅ Подтверждена' : '⏳ Ожидает'}</span></div></div>`;
            });
        } catch(e) { console.log(e); }
    }

    async function loadAdminStatsDirect() {
        if (!currentUser || currentUser.role !== 'admin') return;
        try {
            const res = await fetch('/api/stats/all');
            const allStats = await res.json();
            const unverified = allStats.filter(s => !s.verified);
            const container = document.getElementById('adminDirectList');
            if (!container) return;
            
            let html = '';
            if (unverified.length === 0) {
                html = '<div style="text-align:center; padding:40px;">✅ Нет неподтверждённой статистики</div>';
            } else {
                for (let s of unverified) {
                    html += `
                        <div class="admin-card">
                            <div class="stat-header">
                                <span class="stat-nick">${escapeHtml(s.game_nick || s.username)}</span>
                                <span class="stat-date">${new Date(s.date).toLocaleDateString()}</span>
                            </div>
                            <div class="stat-numbers">
                                <div class="stat-number"><div class="stat-number-value">${s.kills}</div><div class="stat-number-label">💀</div></div>
                                <div class="stat-number"><div class="stat-number-value">${s.kill_percent || 0}%</div><div class="stat-number-label">🎯</div></div>
                                <div class="stat-number"><div class="stat-number-value">${s.hs_percent || 0}%</div><div class="stat-number-label">💥</div></div>
                                <div class="stat-number"><div class="stat-number-value">${s.damage?.toLocaleString() || 0}</div><div class="stat-number-label">⚡</div></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; gap: 10px; flex-wrap: wrap;">
                                <div style="display: flex; gap: 8px;">
                                    ${s.video_link ? `<a href="${s.video_link}" target="_blank">🎥</a>` : ''}
                                    ${s.screenshot ? `<img src="${s.screenshot}" class="screenshot-thumb" onclick="showFullImage('${s.screenshot}')">` : ''}
                                </div>
                                <div>
                                    <button onclick="verifyStat(${s.id})" style="background:#2e7d32;">✅</button>
                                    <button onclick="deleteStat(${s.id})" style="background:#c62828;">🗑️</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            container.innerHTML = html;
        } catch(e) { console.log('Ошибка:', e); }
    }

    async function verifyStat(id) { await fetch(`/api/stats/${id}/verify`, { method: 'PUT' }); loadAdminStatsDirect(); loadLeaderboard(); loadMyStats(); showMsg('uploadMsg', '✅ Подтверждено', false); }
    async function deleteStat(id) { if (!confirm('Удалить?')) return; await fetch(`/api/stats/${id}`, { method: 'DELETE' }); loadAdminStatsDirect(); loadLeaderboard(); loadMyStats(); showMsg('uploadMsg', '✅ Удалено', false); }

    // ========== НЕЙРОНКА С УСИЛЕННОЙ ПРЕДОБРАБОТКОЙ ==========
    async function findMyStatsInScreenshot() {
        if (!currentImageData) return null;
        const nickToFind = getCurrentNick();
        if (!nickToFind) return null;
        
        // Усиленная предобработка
        const enhancedImage = await enhanceImage(currentImageData);
        
        if (!ocrWorker) {
            ocrWorker = await Tesseract.createWorker('rus+eng', 1);
            await ocrWorker.setParameters({ 
                tessedit_char_whitelist: '0123456789%abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ_',
                tessedit_pageseg_mode: '6' 
            });
        }
        
        const { data: { text } } = await ocrWorker.recognize(enhancedImage);
        
        const lines = text.split('\n');
        const nickLower = nickToFind.toLowerCase();
        
        for (let line of lines) {
            const cleanLine = line.replace(/[^a-z0-9_]/gi, ' ').toLowerCase();
            if (cleanLine.includes(nickLower)) {
                const numbers = line.match(/\d+/g);
                if (numbers && numbers.length >= 4) {
                    return {
                        kills: parseInt(numbers[0]),
                        killPercent: parseFloat(numbers[1]),
                        hsPercent: parseFloat(numbers[2]),
                        damage: parseInt(numbers[3])
                    };
                }
            }
        }
        return null;
    }

    // Функция обработки загруженного файла
    async function processFile(file) {
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (ev) => {
            currentImageData = ev.target.result;
            document.getElementById('preview').innerHTML = `<img src="${currentImageData}" class="preview-image" onclick="showFullImage('${currentImageData}')">`;
            
            const nick = getCurrentNick();
            if (!nick) { 
                document.getElementById('ocrResult').innerHTML = `⚠️ Сохраните ник в профиле`; 
                document.getElementById('ocrResult').style.display = 'block'; 
                document.getElementById('sendBtn').style.display = 'none';
                return; 
            }
            
            document.getElementById('ocrResult').innerHTML = `🔍 Улучшение изображения и распознавание... <span class="loading-spinner"></span>`;
            document.getElementById('ocrResult').style.display = 'block';
            document.getElementById('sendBtn').style.display = 'none';
            
            try {
                const stats = await findMyStatsInScreenshot();
                if (stats) {
                    recognizedStats = stats;
                    document.getElementById('ocrResult').innerHTML = `✅ Найдено! 💀${stats.kills} | 🎯${stats.killPercent}% | 💥${stats.hsPercent}% | ⚡${stats.damage.toLocaleString()}`;
                    document.getElementById('sendBtn').style.display = 'block';
                } else {
                    document.getElementById('ocrResult').innerHTML = `❌ Не найден ник "${nick}" в таблице. Попробуйте другой скриншот.`;
                    document.getElementById('sendBtn').style.display = 'none';
                    recognizedStats = null;
                }
            } catch (error) {
                document.getElementById('ocrResult').innerHTML = `❌ Ошибка: ${error.message}`;
                document.getElementById('sendBtn').style.display = 'none';
                recognizedStats = null;
            }
        };
        reader.readAsDataURL(file);
    }

    // Drag and drop
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', async (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            await processFile(file);
        }
    });

    // Клик для выбора файла
    uploadArea.onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            await processFile(file);
        }
    };

    async function sendStats() {
        if (!currentUser) { alert('Войдите в аккаунт'); return; }
        if (!recognizedStats) { alert('Сначала распознайте ник'); return; }
        
        const compressed = await new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 800) { h = (h * 800) / w; w = 800; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = currentImageData;
        });
        
        const payload = {
            username: currentUser.username,
            kills: recognizedStats.kills,
            killPercent: recognizedStats.killPercent,
            hsPercent: recognizedStats.hsPercent,
            damage: recognizedStats.damage,
            videoLink: document.getElementById('videoLink').value,
            screenshot: compressed
        };
        
        const res = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (res.ok) {
            showMsg('uploadMsg', '✅ Статистика отправлена!', false);
            recognizedStats = null;
            document.getElementById('ocrResult').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('videoLink').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('preview').innerHTML = '';
            currentImageData = null;
            loadMyStats(); 
            if (currentUser.role === 'admin') loadAdminStatsDirect();
            loadLeaderboard();
        } else { 
            const err = await res.json(); 
            showMsg('uploadMsg', `❌ ${err.error}`, true); 
        }
    }

    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('uploadBlock').style.display = 'block';
        document.getElementById('showAuthBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'inline-block';
        document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.username}`;
        document.getElementById('currentNickDisplay').innerText = currentUser.gameNick || currentUser.username;
        if (currentUser.role === 'admin') {
            document.getElementById('adminTab').style.display = 'inline-block';
            document.getElementById('adminPanelBlock').style.display = 'block';
            loadAdminStatsDirect();
        }
        loadLeaderboard(); loadMyStats();
    } else { 
        document.getElementById('currentNickDisplay').innerText = localNick; 
        loadLeaderboard(); 
    }
    document.getElementById('searchPlayer')?.addEventListener('input', () => loadLeaderboard());
</script>
