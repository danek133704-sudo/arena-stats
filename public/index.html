<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Arena Stats</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{background:#0a0a0a;color:#ffd966;font-family:sans-serif;padding:20px}
.card{background:#1a1a1a;padding:20px;border-radius:15px;margin-bottom:20px}
button{background:#ffd966;border:none;padding:10px;border-radius:10px;cursor:pointer}
input{padding:10px;margin:5px;width:100%;background:#2c2c2c;color:#ffd966;border:none}
table{width:100%;margin-top:10px}
td,th{padding:8px;border-bottom:1px solid #333}
</style>
</head>

<body>

<h1>⚔️ Arena Stats</h1>

<div class="card">
<h3>🔐 Вход (демо)</h3>
<input id="login" placeholder="логин">
<button onclick="loginUser()">Войти как админ</button>
</div>

<div class="card">
<h3>📸 Загрузка скрина</h3>
<input type="file" id="file">
<button onclick="analyze()">Распознать</button>

<div id="result"></div>
</div>

<div class="card">
<h3>🔧 Админ (<span id="count">0</span>)</h3>
<table>
<thead>
<tr><th>ID</th><th>Kills</th><th>Damage</th><th>Действия</th></tr>
</thead>
<tbody id="admin"></tbody>
</table>
</div>

<script>
let currentUser=null;
let stats=[];
let img=null;

// загрузка картинки
document.getElementById('file').onchange=e=>{
 const reader=new FileReader();
 reader.onload=ev=>img=ev.target.result;
 reader.readAsDataURL(e.target.files[0]);
};

// вход
function loginUser(){
 currentUser={username:'admin',role:'admin'};
 alert('Вы вошли как админ');
 loadAdmin();
}

// OCR
async function analyze(){
 if(!img) return alert('Выбери картинку');

 const worker=await Tesseract.createWorker();

 await worker.loadLanguage('eng');
 await worker.initialize('eng');

 await worker.setParameters({
  tessedit_char_whitelist:'0123456789%'
 });

 const {data:{text}}=await worker.recognize(img);

 console.log("OCR:", text);

 let kills=0;
 let damage=0;

 text.split('\n').forEach(line=>{
  const num=parseInt(line.replace(/\D/g,''));

  if(num>1000){
    damage=num;
  } else if(num>0 && num<100 && !kills){
    kills=num;
  }
 });

 if(!kills || !damage){
  document.getElementById('result').innerText='❌ Не удалось распознать';
  return;
 }

 document.getElementById('result').innerText=
  `✅ Kills: ${kills} | Damage: ${damage}`;

 stats.push({
  id:Date.now(),
  kills,
  damage,
  verified:false
 });

 loadAdmin();

 await worker.terminate();
}

// админка
function loadAdmin(){
 const list=stats.filter(s=>!s.verified);

 document.getElementById('count').innerText=list.length;

 const el=document.getElementById('admin');
 el.innerHTML='';

 list.forEach(s=>{
  el.innerHTML+=`
  <tr>
    <td>${s.id}</td>
    <td>${s.kills}</td>
    <td>${s.damage}</td>
    <td>
      <button onclick="verify(${s.id})">✅</button>
      <button onclick="del(${s.id})">❌</button>
    </td>
  </tr>`;
 });
}

function verify(id){
 const stat=stats.find(s=>s.id===id);
 if(stat) stat.verified=true;
 loadAdmin();
}

function del(id){
 stats=stats.filter(s=>s.id!==id);
 loadAdmin();
}

// автообновление
setInterval(()=>{
 if(currentUser?.role==='admin'){
  loadAdmin();
 }
},3000);

</script>

</body>
</html>
