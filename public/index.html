<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Stats | Трекер статистики</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0a, #030303);
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(20, 20, 30, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 200, 100, 0.2);
        }

        /* Header */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 200, 100, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffcc66, #ffaa33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .telegram-btn {
            background: #2c2c2c;
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #ffaa33;
            transition: 0.2s;
        }
        .telegram-btn a {
            color: #ffaa33;
            text-decoration: none;
            font-weight: 500;
        }
        .telegram-btn:hover {
            background: #ffaa33;
        }
        .telegram-btn:hover a {
            color: #0a0a0a;
        }

        button, .btn {
            background: linear-gradient(95deg, #ffaa33, #ffcc66);
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #111;
        }
        button:hover {
            transform: scale(0.97);
            box-shadow: 0 0 12px rgba(255, 200, 100, 0.6);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ffaa33;
            color: #ffaa33;
        }

        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .card {
            background: rgba(17, 17, 17, 0.8);
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 170, 51, 0.25);
            transition: 0.2s;
        }
        .card:hover {
            border-color: rgba(255, 170, 51, 0.5);
        }

        /* Upload area */
        .upload-area {
            border: 2px dashed #ffaa33;
            border-radius: 28px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #0a0a0a;
        }
        .upload-area:hover {
            background: rgba(255, 170, 51, 0.05);
            border-color: #ffcc66;
        }

        input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid rgba(255, 170, 51, 0.3);
            border-radius: 28px;
            padding: 12px 18px;
            color: #ffdd99;
            margin: 10px 0;
        }
        input:focus {
            border-color: #ffaa33;
            outline: none;
            box-shadow: 0 0 8px #ffaa33;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 170, 51, 0.3);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            background: #1a1a1a;
            color: #aaa;
            transition: all 0.2s ease;
        }
        .tab.active {
            background: #ffaa33;
            color: #0a0a0a;
            font-weight: bold;
            box-shadow: 0 0 8px #ffaa33;
        }
        .tab:hover {
            background: rgba(255, 170, 51, 0.2);
            color: #ffcc66;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Статистические карточки */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 18px;
            border-left: 4px solid #ffaa33;
            transition: all 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 170, 51, 0.2);
            padding-bottom: 8px;
        }
        .stat-nick {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa33;
        }
        .stat-date {
            font-size: 12px;
            color: #ffaa33aa;
        }
        .stat-numbers {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 12px 0;
        }
        .stat-number {
            background: #0a0a0a;
            padding: 8px 12px;
            border-radius: 16px;
            text-align: center;
            flex: 1;
        }
        .stat-number-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffaa33;
        }
        .stat-number-label {
            font-size: 11px;
            color: #ffaa33aa;
        }
        .stat-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-verified {
            background: #2e7d3240;
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .status-pending {
            background: #ff980040;
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        /* Лидерборд */
        .leaderboard-card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s;
        }
        .leaderboard-card:hover {
            background: #2a2a2a;
            transform: translateX(5px);
        }
        .leaderboard-rank {
            font-size: 28px;
            font-weight: bold;
            width: 60px;
            text-align: center;
        }
        .rank-1 { color: gold; text-shadow: 0 0 5px gold; }
        .rank-2 { color: silver; }
        .rank-3 { color: #cd7f32; }
        .leaderboard-info {
            flex: 1;
        }
        .leaderboard-name {
            font-size: 18px;
            font-weight: bold;
        }
        .leaderboard-stats {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            font-size: 13px;
            color: #ffaa33aa;
        }

        /* Личная статистика */
        .personal-stats {
            background: #0e0e12;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 15px;
            border: 1px solid rgba(255, 170, 51, 0.3);
        }
        .personal-stat {
            text-align: center;
            background: #1a1a1a;
            padding: 15px 25px;
            border-radius: 24px;
            min-width: 140px;
        }
        .personal-stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #ffaa33;
        }
        .personal-stat-label {
            font-size: 12px;
            color: #ffaa33aa;
            margin-top: 5px;
        }

        /* Профиль */
        .profile-menu {
            position: relative;
            display: inline-block;
        }
        .profile-dropdown {
            position: absolute;
            right: 0;
            top: 45px;
            background: #1e1e1e;
            border: 1px solid #ffaa33;
            border-radius: 24px;
            padding: 1rem;
            width: 280px;
            z-index: 200;
            backdrop-filter: blur(8px);
        }
        .nick-edit {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .nick-edit input {
            flex: 1;
            margin: 0;
            padding: 8px 12px;
        }

        /* Модалка для изображения */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000dd;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 24px;
        }

        .status-msg {
            padding: 12px;
            border-radius: 24px;
            margin-top: 12px;
            text-align: center;
        }
        .status-success {
            background: #2e7d3240;
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .status-error {
            background: #c6282840;
            color: #ff6b6b;
            border: 1px solid #c62828;
        }
        .debug-panel {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 11px;
            color: #5f5;
            max-height: 200px;
            overflow: auto;
            margin-top: 15px;
        }
        .screenshot-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .screenshot-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 0 8px #ffaa33;
        }
        @media (max-width: 700px) {
            .navbar { flex-direction: column; text-align: center; }
            .container { padding: 15px; }
            .stats-grid { grid-template-columns: 1fr; }
            .leaderboard-card { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <h1>⚔️ ARENA STATS</h1>
        <p style="font-size: 12px;">Трекер статистики | Общий лидерборд</p>
    </div>
    <div class="telegram-btn"><a href="https://t.me/flikfak" target="_blank">🤝 @flikfak — сотрудничество</a></div>
    <div id="authArea">
        <button id="showAuthBtn" onclick="showAuthModal()">🔐 Вход / Регистрация</button>
        <div id="userInfo" style="display: none;">
            <span id="userNameDisplay"></span>
            <div class="profile-menu" style="display: inline-block; margin-left: 12px;">
                <button class="btn-outline" onclick="toggleProfile()">👤 Профиль</button>
                <div id="profileDropdown" class="profile-dropdown" style="display: none;">
                    <div><strong>Игровой ник:</strong> <span id="currentNickDisplay">Flik_Homixide</span></div>
                    <div class="nick-edit">
                        <input type="text" id="nickInput" placeholder="Новый ник">
                        <button onclick="saveNick()">Сохранить</button>
                    </div>
                    <button onclick="logout()" class="btn-outline" style="margin-top: 15px; width: 100%;">🚪 Выйти</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- Auth Modal -->
    <div id="authModal" class="card" style="display: none;">
        <div class="tabs" style="border: none;">
            <div class="tab active" onclick="switchAuth('login')">Вход</div>
            <div class="tab" onclick="switchAuth('register')">Регистрация</div>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Логин">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="doLogin()">Войти</button>
            <div id="loginMsg"></div>
        </div>
        <div id="registerForm" style="display: none;">
            <input type="text" id="regUsername" placeholder="Логин">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="text" id="regGameNick" placeholder="Ник в игре" value="Flik_Homixide">
            <button onclick="doRegister()">Зарегистрироваться</button>
            <div id="regMsg"></div>
        </div>
    </div>

    <!-- Upload Section -->
    <div id="uploadBlock" class="card" style="display: none;">
        <h2 style="margin-bottom: 15px;">📸 Загрузить скриншот</h2>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <div style="font-size: 44px; margin-bottom: 10px;">📸</div>
            <p>Нажми или перетащи скриншот с таблицей статистики</p>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>
        <div id="preview" style="text-align: center;"></div>
        <input type="text" id="videoLink" placeholder="🎥 Ссылка на видео (YouTube/Twitch)">
        <div id="ocrResult" style="background: #0a0a0a; padding: 15px; border-radius: 20px; margin: 15px 0; display: none;"></div>
        <button id="sendBtn" style="display: none;" onclick="sendStats()">📤 Отправить статистику</button>
        <div id="uploadMsg"></div>
    </div>

    <!-- Main Tabs -->
    <div class="card">
        <div class="tabs">
            <div class="tab active" onclick="showTab('leaderboard')">🏆 ЛИДЕРБОРД</div>
            <div class="tab" onclick="showTab('mystats')">📊 МОЯ СТАТИСТИКА</div>
            <div class="tab" id="adminTab" style="display: none;" onclick="showTab('admin')">🔧 АДМИН-ПАНЕЛЬ</div>
        </div>

        <div id="leaderboardTab" class="tab-content active">
            <input type="text" id="searchPlayer" placeholder="🔍 Поиск игрока..." style="margin-bottom: 20px;">
            <div id="leaderboardList"></div>
        </div>

        <div id="mystatsTab" class="tab-content">
            <!-- Персональная статистика -->
            <div id="personalStatsContainer" class="personal-stats" style="display: none;"></div>
            <div id="myStatsList"></div>
        </div>

        <div id="adminTabContent" class="tab-content">
            <div id="adminList"></div>
        </div>
    </div>

    <!-- Debug -->
    <details style="margin-top: 20px;">
        <summary style="color: #ffaa33aa; cursor: pointer;">🔧 Отладка</summary>
        <div id="debugLog" class="debug-panel"></div>
    </details>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
    let currentUser = null;
    let currentImageData = null;
    let recognizedStats = null;
    let ocrWorker = null;
    let localNick = localStorage.getItem('arena_nick') || 'Flik_Homixide';

    // ========== Утилиты ==========
    function log(msg) {
        const debugDiv = document.getElementById('debugLog');
        if (debugDiv) {
            debugDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }
        console.log(msg);
    }

    function showMsg(elId, msg, isError) {
        const el = document.getElementById(elId);
        if (el) {
            el.innerHTML = `<div class="status-msg ${isError ? 'status-error' : 'status-success'}">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 4000);
        }
    }

    function saveNick() {
        const newNick = document.getElementById('nickInput').value.trim();
        if (newNick) {
            localNick = newNick;
            localStorage.setItem('arena_nick', localNick);
            document.getElementById('currentNickDisplay').innerText = localNick;
            document.getElementById('nickInput').value = '';
            log(`✅ Ник сохранён: ${localNick}`);
            showMsg('uploadMsg', `✅ Ник сохранён: ${localNick}`, false);
            // Обновляем личную статистику (ник изменился)
            if (currentUser) loadPersonalStats();
        } else {
            showMsg('uploadMsg', '❌ Введите ник', true);
        }
    }

    function getCurrentNick() {
        return localNick || (currentUser?.gameNick) || (currentUser?.username) || '';
    }

    // ========== Авторизация ==========
    async function doRegister() {
        const payload = {
            username: document.getElementById('regUsername').value,
            password: document.getElementById('regPassword').value,
            gameNick: document.getElementById('regGameNick').value
        };
        const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            showMsg('regMsg', '✅ Регистрация успешна! Войдите.', false);
            switchAuth('login');
        } else {
            showMsg('regMsg', `❌ ${data.error}`, true);
        }
    }

    async function doLogin() {
        const payload = {
            username: document.getElementById('loginUsername').value,
            password: document.getElementById('loginPassword').value
        };
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (res.ok) {
            currentUser = data.user;
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('uploadBlock').style.display = 'block';
            document.getElementById('showAuthBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'inline-block';
            document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.username}`;
            document.getElementById('currentNickDisplay').innerText = localNick || currentUser.gameNick || currentUser.username;
            if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'inline-block';
            log(`✅ Вход: ${currentUser.username} (${currentUser.role})`);
            loadLeaderboard();
            loadMyStats();
            loadPersonalStats();
            if (currentUser.role === 'admin') loadAdminStats();
        } else {
            showMsg('loginMsg', `❌ ${data.error}`, true);
        }
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('user');
        location.reload();
    }

    function showAuthModal() {
        const modal = document.getElementById('authModal');
        modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    }

    function switchAuth(type) {
        document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('registerForm').style.display = type === 'register' ? 'block' : 'none';
    }

    function toggleProfile() {
        const dropdown = document.getElementById('profileDropdown');
        dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById(tab + 'Tab').classList.add('active');
        if (tab === 'leaderboard') loadLeaderboard();
        if (tab === 'mystats') { loadMyStats(); loadPersonalStats(); }
        if (tab === 'admin' && currentUser?.role === 'admin') loadAdminStats();
    }

    // ========== Личная статистика (макс/средний урон) ==========
    async function loadPersonalStats() {
        if (!currentUser) return;
        try {
            const res = await fetch(`/api/user-stats/${currentUser.username}`);
            const stats = await res.json();
            const container = document.getElementById('personalStatsContainer');
            if (!container) return;
            if (stats.totalKills === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            container.innerHTML = `
                <div class="personal-stat">
                    <div class="personal-stat-value">${stats.totalKills}</div>
                    <div class="personal-stat-label">Всего убийств</div>
                </div>
                <div class="personal-stat">
                    <div class="personal-stat-value">${stats.totalDamage.toLocaleString()}</div>
                    <div class="personal-stat-label">Всего урона</div>
                </div>
                <div class="personal-stat">
                    <div class="personal-stat-value">${stats.maxDamage.toLocaleString()}</div>
                    <div class="personal-stat-label">Максимальный урон</div>
                </div>
                <div class="personal-stat">
                    <div class="personal-stat-value">${stats.avgDamage.toLocaleString()}</div>
                    <div class="personal-stat-label">Средний урон</div>
                </div>
            `;
        } catch(e) { log('PersonalStats error: ' + e); }
    }

    // ========== Лидерборд ==========
    async function loadLeaderboard() {
        try {
            const res = await fetch('/api/leaderboard');
            const data = await res.json();
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '';
            if (!data.length) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">🏆 Пока нет данных</div>';
                return;
            }
            data.slice(0, 30).forEach((p, i) => {
                const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                container.innerHTML += `
                    <div class="leaderboard-card">
                        <div class="leaderboard-rank ${rankClass}">#${i+1}</div>
                        <div class="leaderboard-info">
                            <div class="leaderboard-name">${p.game_nick || p.username}</div>
                            <div class="leaderboard-stats">
                                <span>💀 ${p.kills} убийств</span>
                                <span>⚡ ${p.damage?.toLocaleString()} урона</span>
                            </div>
                        </div>
                        ${p.video_link ? `<a href="${p.video_link}" target="_blank" style="color:#ffaa33;">🎥</a>` : ''}
                    </div>
                `;
            });
        } catch(e) { log('Leaderboard error: ' + e); }
    }

    // ========== Моя статистика ==========
    async function loadMyStats() {
        if (!currentUser) return;
        try {
            const res = await fetch('/api/stats/my', { headers: { username: currentUser.username } });
            const stats = await res.json();
            const container = document.getElementById('myStatsList');
            container.innerHTML = '';
            if (!stats.length) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">📭 Нет статистики. Загрузите скриншот!</div>';
                return;
            }
            // Сортируем по дате (новые сверху)
            stats.sort((a,b) => new Date(b.date) - new Date(a.date));
            stats.forEach(s => {
                container.innerHTML += `
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-nick">${s.game_nick || s.username}</span>
                            <span class="stat-date">${new Date(s.date).toLocaleDateString()}</span>
                        </div>
                        <div class="stat-numbers">
                            <div class="stat-number">
                                <div class="stat-number-value">${s.kills}</div>
                                <div class="stat-number-label">💀</div>
                            </div>
                            <div class="stat-number">
                                <div class="stat-number-value">${s.kill_percent || 0}%</div>
                                <div class="stat-number-label">🎯</div>
                            </div>
                            <div class="stat-number">
                                <div class="stat-number-value">${s.hs_percent || 0}%</div>
                                <div class="stat-number-label">💥</div>
                            </div>
                            <div class="stat-number">
                                <div class="stat-number-value">${s.damage?.toLocaleString() || 0}</div>
                                <div class="stat-number-label">⚡</div>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div>
                                <span class="stat-status ${s.verified ? 'status-verified' : 'status-pending'}">
                                    ${s.verified ? '✅ Подтверждена' : '⏳ Ожидает проверки'}
                                </span>
                            </div>
                            <div style="display: flex; gap: 10px;">
                                ${s.video_link ? `<a href="${s.video_link}" target="_blank" style="color:#ffaa33;">🎥 Видео</a>` : ''}
                                ${s.screenshot ? `<img src="${s.screenshot}" class="screenshot-thumb" onclick="showFullImage('${s.screenshot}')">` : ''}
                                ${!s.verified ? `<button onclick="deleteMyStat(${s.id})" style="background:#c62828; padding:5px 12px;">🗑️</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch(e) { log('MyStats error: ' + e); }
    }

    async function deleteMyStat(id) {
        if (!confirm('Удалить эту статистику?')) return;
        await fetch(`/api/stats/${id}`, { method: 'DELETE' });
        loadMyStats();
        loadPersonalStats();
        loadLeaderboard();
        showMsg('uploadMsg', '✅ Статистика удалена', false);
    }

    // ========== Админ-панель ==========
    async function loadAdminStats() {
        if (!currentUser || currentUser.role !== 'admin') return;
        try {
            const res = await fetch('/api/stats/all');
            const allStats = await res.json();
            const unverified = allStats.filter(s => !s.verified);
            const container = document.getElementById('adminList');
            container.innerHTML = '';
            if (!unverified.length) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">✅ Нет неподтверждённой статистики</div>';
                return;
            }
            unverified.forEach(s => {
                container.innerHTML += `
                    <div class="stat-card">
                        <div class="stat-header">
                            <span class="stat-nick">${s.game_nick || s.username}</span>
                            <span class="stat-date">${new Date(s.date).toLocaleDateString()}</span>
                        </div>
                        <div class="stat-numbers">
                            <div class="stat-number"><div class="stat-number-value">${s.kills}</div><div class="stat-number-label">💀</div></div>
                            <div class="stat-number"><div class="stat-number-value">${s.kill_percent || 0}%</div><div class="stat-number-label">🎯</div></div>
                            <div class="stat-number"><div class="stat-number-value">${s.hs_percent || 0}%</div><div class="stat-number-label">💥</div></div>
                            <div class="stat-number"><div class="stat-number-value">${s.damage?.toLocaleString() || 0}</div><div class="stat-number-label">⚡</div></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                            <div>${s.video_link ? `<a href="${s.video_link}" target="_blank">🎥 Видео</a>` : ''} ${s.screenshot ? `<img src="${s.screenshot}" class="screenshot-thumb" onclick="showFullImage('${s.screenshot}')">` : ''}</div>
                            <div>
                                <button onclick="verifyStat(${s.id})" style="background:#2e7d32;">✅ Подтвердить</button>
                                <button onclick="deleteStat(${s.id})" style="background:#c62828;">🗑️ Отклонить</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        } catch(e) { log('AdminStats error: ' + e); }
    }

    async function verifyStat(id) { await fetch(`/api/stats/${id}/verify`, { method: 'PUT' }); loadAdminStats(); loadLeaderboard(); loadMyStats(); loadPersonalStats(); showMsg('uploadMsg', '✅ Подтверждено', false); }
    async function deleteStat(id) { if (!confirm('Удалить?')) return; await fetch(`/api/stats/${id}`, { method: 'DELETE' }); loadAdminStats(); loadLeaderboard(); loadMyStats(); loadPersonalStats(); showMsg('uploadMsg', '✅ Удалено', false); }
    function showFullImage(src) { const m = document.createElement('div'); m.className = 'modal'; m.innerHTML = `<img src="${src}">`; m.onclick = () => m.remove(); document.body.appendChild(m); }

    // ========== Нейронка ==========
    async function findMyStatsInScreenshot() {
        if (!currentImageData) return null;
        const nickToFind = getCurrentNick();
        if (!nickToFind) return null;
        if (!ocrWorker) {
            log('Загрузка нейронки...');
            ocrWorker = await Tesseract.createWorker('rus+eng', 1);
            await ocrWorker.setParameters({ tessedit_char_whitelist: '0123456789%abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ_', tessedit_pageseg_mode: '6' });
            log('Нейронка готова');
        }
        log('Распознавание...');
        const { data: { text } } = await ocrWorker.recognize(currentImageData);
        const lines = text.split('\n');
        for (let line of lines) {
            if (line.toLowerCase().includes(nickToFind.toLowerCase())) {
                const numbers = line.match(/\d+/g);
                if (numbers && numbers.length >= 4) {
                    log(`Найдено в строке: ${line}`);
                    return { kills: parseInt(numbers[0]), killPercent: parseFloat(numbers[1]), hsPercent: parseFloat(numbers[2]), damage: parseInt(numbers[3]) };
                }
            }
        }
        return null;
    }

    document.getElementById('fileInput').onchange = async (e) => {
        const f = e.target.files[0];
        if (f) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                currentImageData = ev.target.result;
                document.getElementById('preview').innerHTML = `<img src="${currentImageData}" style="max-width:100%; max-height:200px; border-radius:16px;">`;
                const nick = getCurrentNick();
                if (!nick) {
                    document.getElementById('ocrResult').innerHTML = `⚠️ Сначала сохраните ник в профиле`;
                    document.getElementById('ocrResult').style.display = 'block';
                    return;
                }
                const stats = await findMyStatsInScreenshot();
                if (stats) {
                    recognizedStats = stats;
                    document.getElementById('ocrResult').innerHTML = `✅ Найдено! 💀 ${stats.kills} | 🎯 ${stats.killPercent}% | 💥 ${stats.hsPercent}% | ⚡ ${stats.damage.toLocaleString()}`;
                    document.getElementById('ocrResult').style.display = 'block';
                    document.getElementById('sendBtn').style.display = 'block';
                } else {
                    document.getElementById('ocrResult').innerHTML = `❌ Не найден ник "${nick}" в таблице. Проверьте ник в профиле.`;
                    document.getElementById('ocrResult').style.display = 'block';
                    document.getElementById('sendBtn').style.display = 'none';
                    recognizedStats = null;
                }
            };
            reader.readAsDataURL(f);
        }
    };

    async function sendStats() {
        if (!currentUser) { alert('Войдите'); return; }
        if (!recognizedStats) { alert('Сначала распознайте ник'); return; }
        const compressed = await new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 800) { h = (h * 800) / w; w = 800; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.6));
            };
            img.src = currentImageData;
        });
        const payload = {
            username: currentUser.username,
            kills: recognizedStats.kills,
            killPercent: recognizedStats.killPercent,
            hsPercent: recognizedStats.hsPercent,
            damage: recognizedStats.damage,
            videoLink: document.getElementById('videoLink').value,
            screenshot: compressed
        };
        const res = await fetch('/api/stats', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (res.ok) {
            showMsg('uploadMsg', '✅ Статистика отправлена!', false);
            recognizedStats = null;
            document.getElementById('ocrResult').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('videoLink').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('preview').innerHTML = '';
            currentImageData = null;
            loadMyStats();
            loadPersonalStats();
            if (currentUser.role === 'admin') loadAdminStats();
            loadLeaderboard();
        } else {
            const err = await res.json();
            showMsg('uploadMsg', `❌ Ошибка: ${err.error || 'неизвестная'}`, true);
        }
    }

    // ========== Инициализация ==========
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('authModal').style.display = 'none';
        document.getElementById('uploadBlock').style.display = 'block';
        document.getElementById('showAuthBtn').style.display = 'none';
        document.getElementById('userInfo').style.display = 'inline-block';
        document.getElementById('userNameDisplay').innerHTML = `👤 ${currentUser.username}`;
        document.getElementById('currentNickDisplay').innerText = localNick || currentUser.gameNick || currentUser.username;
        if (currentUser.role === 'admin') document.getElementById('adminTab').style.display = 'inline-block';
        loadLeaderboard();
        loadMyStats();
        loadPersonalStats();
        if (currentUser.role === 'admin') loadAdminStats();
    } else {
        document.getElementById('currentNickDisplay').innerText = localNick;
        loadLeaderboard();
    }
</script>
</body>
</html>
